<!doctype html>
<html class="booting" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChannelGuard</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      html.booting body { visibility: hidden; }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        padding: 12px;
        width: 220px;
        overflow-x: hidden;
      }
      h1 { font-size: 14px; margin: 0 0 10px 0; }
      label { display: none; }
      input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
      button { width: 100%; margin-top: 10px; padding: 10px; border-radius: 10px; font-size: 14px; cursor: pointer; }
      .btn-work { border: 1px solid #222; background: #222; color: #fff; }
      .btn-idle { border: 1px solid #222; background: #fff; color: #222; }
      button:disabled { border-color: #cfcfcf; background: #f2f2f2; color: #777; cursor: not-allowed; }
      .msg { margin-top: 10px; font-size: 12px; color: #333; }
      .err { color: #b00020; }
      .muted { color: #666; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <h1>ChannelGuard</h1>

    <div id="stepPin">
      <label for="pin">PIN</label>
      <input id="pin" type="password" inputmode="numeric" autocomplete="off" placeholder="PIN" />
      <button id="unlock" class="btn-work">Unlock</button>
    </div>

    <div id="stepActions" class="hidden">
      <div id="contextLabel" class="muted"></div>
      <button id="addChannel" class="btn-work hidden">Allow channel</button>
      <button id="allowDay" class="btn-work hidden">Allow for 1 day</button>
      <button id="enableForever" class="btn-work hidden">Enable channel</button>
      <button id="enableDay" class="btn-work hidden">Enable for 1 day</button>
      <button id="switchForever" class="btn-work hidden">Switch to forever</button>
      <button id="switchDay" class="btn-work hidden">Switch to 1 day</button>
      <button id="disableChannel" class="btn-work hidden">Disable channel</button>
      <button id="deleteChannel" class="btn-work hidden">Remove channel</button>
      <button id="openOptions" class="btn-work">Options</button>
    </div>

    <div id="msg" class="msg"></div>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
