<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blocked</title>
    <style>
      * { box-sizing: border-box; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 24px; color: #171717; }
      .card { max-width: 900px; margin: 0 auto; border: 1px solid #d7d7d7; border-radius: 8px; padding: 24px; }
      h1 { margin: 0 0 8px; font-size: 28px; }
      p { margin: 8px 0; color: #333; }
      input { padding: 10px; border: 1px solid #bbb; border-radius: 6px; font-size: 16px; }
      button { padding: 10px 14px; border-radius: 8px; font-size: 15px; cursor: pointer; }
      .btn-work { border: 1px solid #222; background: #222; color: #fff; }
      .btn-idle { border: 1px solid #222; background: #fff; color: #222; }
      button:disabled { border-color: #cfcfcf; background: #f2f2f2; color: #777; cursor: not-allowed; }
      textarea { width: 100%; min-height: 110px; margin-top: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 14px; }
      .row { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      .muted { color: #666; font-size: 13px; }
      .hint { flex: 1 1 100%; margin-top: -4px; color: #555; font-size: 13px; }
      .msg { margin-top: 10px; font-size: 13px; color: #333; }
      .err { color: #b00020; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Content blocked</h1>
      <p>This YouTube content is blocked by Inferfox ChannelGuard.</p>
      <p id="details" class="muted"></p>

      <div id="pinBox" class="row">
        <input id="pin" type="password" inputmode="numeric" autocomplete="off" placeholder="PIN" />
        <button id="unlock" class="btn-work">Unlock actions</button>
        <div id="defaultPinHint" class="hint hidden">Use PIN 0000, then change it in Options.</div>
      </div>

      <div id="actions" class="row hidden">
        <button id="allowForever" class="btn-work hidden">Allow channel</button>
        <button id="allowDay" class="btn-work hidden">Allow for 1 day</button>
        <button id="enableForever" class="btn-work hidden">Enable channel</button>
        <button id="enableDay" class="btn-work hidden">Enable for 1 day</button>
        <button id="switchForever" class="btn-work hidden">Switch to forever</button>
        <button id="switchDay" class="btn-work hidden">Switch to 1 day</button>
        <button id="disableChannel" class="btn-work hidden">Disable channel</button>
        <button id="deleteChannel" class="btn-work hidden">Remove channel</button>
        <button id="copyRequest" class="btn-work">Copy request</button>
        <button id="openOptions" class="btn-work">Options</button>
      </div>

      <textarea id="requestText" readonly hidden></textarea>
      <p id="msg" class="msg"></p>
    </div>
    <script src="shared.js"></script>
    <script src="blocked.js"></script>
  </body>
</html>
